name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm-vector-tests:
    name: JVM — Vector API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run JVM tests (Vector API backend)
        run: ./gradlew :simdjson-kotlin:jvmTest

  jvm-jni-tests:
    name: JVM — JNI backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run JVM tests (JNI backend)
        run: ./gradlew :simdjson-kotlin:jvmTestJni

  native-tests:
    name: Native — ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macosArm64Test
            runner: macos-14
          - target: linuxX64Test
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run native tests
        run: ./gradlew :simdjson-kotlin:${{ matrix.target }}

  ios-simulator-test:
    name: iOS Simulator
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run iOS simulator tests
        run: ./gradlew :simdjson-kotlin:iosSimulatorArm64Test

  android-host-test:
    name: Android Host
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Android host tests
        run: ./gradlew :simdjson-kotlin:testAndroidHostTest

  serialization-tests:
    name: Serialization
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run serialization tests
        run: ./gradlew :simdjson-kotlin-serialization:allTests
